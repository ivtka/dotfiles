theme = "noctis"

[editor]
line-number = "absolute"
mouse = false
color-modes = true

[editor.lsp]
display-messages = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.whitespace.render]
space = "all"
tab = "all"
newline = "none"

[editor.statusline]
left = ["mode", "file-name"]
right = ["diagnostics", "spinner", "file-type", "selections", "position"]